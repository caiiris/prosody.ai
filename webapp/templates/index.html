<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Poetry Era — Find the closest time period</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Poetry Era</h1>
      <p class="tagline">Paste a poem and discover its closest time period.</p>
    </header>

    <section class="input-section">
      <label for="poem-input">Your poem</label>
      <textarea
        id="poem-input"
        name="poem"
        rows="12"
        placeholder="Paste or type a poem here…"
        autofocus
      ></textarea>
      <div class="actions">
        <button type="button" id="analyze-btn" class="btn btn-primary">Analyze</button>
        <button type="button" id="clear-btn" class="btn btn-secondary">Clear</button>
      </div>
    </section>

    <div id="loading" class="loading" hidden aria-busy="true">
      <span class="loading-dot"></span>Analyzing…
    </div>

    <section class="error-section" id="error-section" aria-live="assertive" hidden>
      <p id="error-message"></p>
    </section>

    <section class="result-section" id="result-section" aria-live="polite" hidden>

      <!-- Era headline -->
      <div class="result-era-header" id="era-header">
        <div class="era-badge" id="era-badge"></div>
        <div>
          <div class="result-era-name" id="era-name"></div>
          <div class="result-era-years" id="era-years"></div>
        </div>
      </div>
      <p class="result-era-desc" id="era-desc"></p>

      <!-- Probability bars -->
      <div class="result-block">
        <h3 class="block-title">Era probabilities</h3>
        <div id="prob-bars"></div>
      </div>

      <!-- Top reasons -->
      <div class="result-block">
        <h3 class="block-title">Why we think so</h3>
        <ul class="reasons-list" id="reasons-list"></ul>
      </div>

      <!-- Feature values -->
      <div class="result-block">
        <h3 class="block-title">Feature breakdown</h3>
        <table class="feature-table" id="feature-table">
          <tbody></tbody>
        </table>
      </div>

    </section>
  </main>

  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
